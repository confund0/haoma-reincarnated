org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Privacy / telemetry posture. See docs/MOBILE-PRIVACY.md.
# Belt-and-braces — Gradle build scans require a develocity plugin we never apply,
# but if a future contributor adds one, we want auto-publish off.
gradle.publish.skip=true
systemProp.gradle.scan.captureGoogleAnalytics=false
